<!DOCTYPE html>
<html lang="en">  
  <head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buy Airtime- FREENIUM DATA</title>
  <link rel="stylesheet" href="data.css" />
   <link rel="icon" href="https://i.imgur.com/KTBvgla.png" type="image/png">
</head>
<body>
  <div id="globalSpinner" class="hidden">
  <img src="https://i.imgur.com/KTBvgla.png" alt="Loading..." />
</div>

<section class="buy-data-section">
  <div class="data-container">
  <h2>Buy Airtime</h2>
  <h3>Select Network</h3>

  <div class="network" onclick="selectedNetwork(this)">
    <img src="https://i.imgur.com/nqB32k8.png" alt="MTN" data-network="MTN" />
  </div>

  <div class="network" onclick="selectedNetwork(this)">
    <img src="https://i.imgur.com/FXvtyZZ.png" alt="Airtel" data-network="Airtel" />
  </div>

  <div class="network" onclick="selectedNetwork(this)">
    <img src="https://i.imgur.com/mgjfAJr.jpeg" alt="Glo" data-network="Glo" />
  </div>

  <div class="network" onclick="selectedNetwork(this)">
    <img src="https://i.imgur.com/XKy0ckO.jpeg" alt="9mobile" data-network="9mobile" />
  </div>

  <!-- Hidden input to store the selected value -->
  <input type="hidden" id="selectedNetwork">
</div>
    <form id="airtime-form">
      <input type="tel" id="phone" placeholder="Enter Phone Number" required />
      <input type="number" id="amount" placeholder="Enter Amount (₦)" required />

     <button id="buyBtn">Buy Now</button>

      <a href="dashboard.html" class="back-arrow">&lt; PREVIOUS</a>
    </form>

    <div id="toast" class="toast">Transaction Successful</div>
  </div>
</section>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js";
  import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-auth.js";

  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyDLyAoL10FFU76h19FX-20wBliMssMlgmE",
    authDomain: "freenium-data001.firebaseapp.com",
    projectId: "freenium-data001",
    storageBucket: "freenium-data001.appspot.com",
    messagingSenderId: "867380700269",
    appId: "1:867380700269:web:a5dc407b51dcf7acdf4b64"
  };

  // Init Firebase
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  // 👇 Airtime handler
  window.addEventListener("DOMContentLoaded", () => {
    const buyBtn = document.getElementById("buyBtn");

    buyBtn.addEventListener("click", async (e) => {
      e.preventDefault();

      const selectedNetwork = document.getElementById("selectedNetwork").value.toLowerCase();
      const userPhone = document.getElementById("phone").value.trim();
      const purchaseAmount = document.getElementById("amount").value;

      if (!selectedNetwork || !userPhone || !purchaseAmount) {
        alert("🚫 Please complete all fields!");
        return;
      }

      onAuthStateChanged(auth, async (user) => {
        if (!user) {
          alert("❌ Please log in first");
          return;
        }

        const requestId = `airtime_${user.uid}_${selectedNetwork}_${userPhone}_${Date.now()}`;
        const API_KEY = "6ec6975c371ec9c4236c085fff911c3fdfea3570c41ed7d5668ddb1cab352895"; // 🔐 replace this with your real key

        try {
          // Save to Firebase
          await addDoc(collection(db, "transactions"), {
            uid: user.uid,
            type: "airtime",
            network: selectedNetwork,
            phone: userPhone,
            amount: Number(purchaseAmount),
            request_id: requestId,
            status: "pending",
            createdAt: serverTimestamp()
          });

          // Make Simhost Airtime API call
          const response = await fetch("https://simhostng.com/api/airtime", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              apikey: API_KEY,
              network: selectedNetwork,
              mobile: userPhone,
              amount: purchaseAmount,
              request_id: requestId
            })
          });

          const result = await response.json();
          console.log("Simhost response:", result);

          if (result.status === "success") {
            showToast("✅ Airtime purchase successful!");
          } else {
            showToast("❌ Airtime failed: " + result.message);
            console.error("Simhost error:", result);
          }
        } catch (err) {
          console.error("🔥 Error:", err);
          showToast("❌ Something went wrong");
        }
      });
    });
  });
</script>
</body>
</html>
